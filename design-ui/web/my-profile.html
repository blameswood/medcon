<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>资料更新 - 个人中心</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .profileLayout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; padding: 60px 80px; max-width: 1440px; margin: 0 auto; }
        .sidebar { background: #fff; border-radius: 20px; padding: 24px; border: 1px solid var(--border); height: fit-content; }
        .sideNav { display: flex; flex-direction: column; gap: 8px; }
        .sideNavItem { padding: 12px 16px; border-radius: 12px; color: var(--mutedForeground); transition: all 0.2s; display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .sideNavItem:hover { background: #f8fafc; color: var(--primary); }
        .sideNavItem.active { background: #eff6ff; color: var(--primary); }
        
        .mainArea { background: #fff; border-radius: 24px; padding: 40px; box-shadow: var(--shadowSm); border: 1px solid var(--border); }
        .formRow { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .avatarUpload { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--border); }
        .currentAvatar { width: 80px; height: 80px; border-radius: 40px; border: 2px solid var(--primary); }
    </style>
</head>
<body>
    <header class="webHeader">
        <div class="webLogo">🌐 MedCon 2026</div>
        <nav class="webNav">
            <a href="index.html" class="webNavItem">首页</a>
            <a href="schedule.html" class="webNavItem">日程</a>
            <a href="paper.html" class="webNavItem">论文投稿</a>
            <a href="hotel.html" class="webNavItem">酒店预订</a>
        </nav>
        <div class="webUserArea">
            <a href="index.html" class="langSwitch">返回主页</a>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" style="width:40px;height:40px;border-radius:20px;border:2px solid var(--primary);">
        </div>
    </header>

    <main class="profileLayout">
        <aside class="sidebar">
            <div class="sideNav">
                <a href="profile.html" class="sideNavItem">📋 我的报名</a>
                <a href="my-papers.html" class="sideNavItem">📄 我的投稿</a>
                <a href="my-hotels.html" class="sideNavItem">🏨 酒店预订</a>
                <a href="my-schedule.html" class="sideNavItem">📅 我的日程</a>
                <a href="my-profile.html" class="sideNavItem active">👤 个人资料</a>
                <div style="margin: 12px 0; border-top: 1px solid var(--border);"></div>
                <a href="help.html" class="sideNavItem">❓ 帮助中心</a>
                <a href="help.html#contact" class="sideNavItem">📞 联系我们</a>
                <a href="index.html" class="sideNavItem" style="color: #ef4444;">🚪 退出登录</a>
            </div>
        </aside>

        <section class="mainArea">
            <h2 style="margin-bottom: 32px;">个人资料设置</h2>
            
            <div class="avatarUpload">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="currentAvatar">
                <div>
                    <button class="btnRegWeb" style="margin-bottom: 8px;">更换头像</button>
                    <p class="textSm textMuted">支持 JPG, PNG. 建议尺寸 200x200.</p>
                </div>
            </div>

            <div class="formRow">
                <div class="formGroup">
                    <label class="formLabel">真实姓名</label>
                    <input type="text" class="formInput" value="Felix Chan">
                </div>
                <div class="formGroup">
                    <label class="formLabel">手机号码</label>
                    <input type="text" class="formInput" value="138****5678" disabled>
                </div>
            </div>

            <div class="formRow">
                <div class="formGroup">
                    <label class="formLabel">所属单位</label>
                    <input type="text" class="formInput" value="浙江大学医学院附属第一医院">
                </div>
                <div class="formGroup">
                    <label class="formLabel">职称/职位</label>
                    <input type="text" class="formInput" value="主任医师">
                </div>
            </div>

            <div class="formGroup" style="margin-bottom: 32px;">
                <label class="formLabel">邮箱地址</label>
                <input type="email" class="formInput" value="felix.chan@hospital.edu.cn">
            </div>

            <button class="btnPrimaryWeb" style="width: 200px; height: 48px;" onclick="alert('资料更新成功！')">保存修改</button>
        </section>
    </main>

    <footer class="webFooter">© 2026 全球医疗科技博览组委会 · 版权所有</footer>

</body>
</html>
