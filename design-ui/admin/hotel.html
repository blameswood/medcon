<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>住宿管理 - 管理后台</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="adminLayout">
    <aside class="adminSidebar">
      <div class="sidebarLogo"><span>✦</span><span>会议管理后台</span></div>
      <nav class="sidebarNav">
        <a class="sidebarItem" href="index.html"><span class="sidebarIcon">📊</span> 工作台</a>
        <a class="sidebarItem" href="conference.html"><span class="sidebarIcon">🎤</span> 会议管理</a>
        <a class="sidebarItem" href="attendees.html"><span class="sidebarIcon">👥</span> 参会管理</a>
        <a class="sidebarItem" href="papers.html"><span class="sidebarIcon">📄</span> 投稿评审</a>
        <a class="sidebarItem active" href="javascript:void(0)"><span class="sidebarIcon">🏨</span> 住宿管理</a>
        <div class="sidebarDivider"></div>
        <a class="sidebarItem" href="settings.html"><span class="sidebarIcon">⚙️</span> 系统设置</a>
      </nav>
    </aside>

    <div class="adminRight">
      <div class="adminTopbar">
        <span class="topbarTitle">住宿管理</span>
        <div class="topbarRight">
          <span style="font-size:13px;color:var(--mutedForeground)">管理员</span>
          <div class="topbarAvatar">A</div>
        </div>
      </div>

      <div class="adminContent">
        <div class="tableCard">
          <div class="tableToolbar">
            <div style="display:flex;gap:12px;align-items:center">
              <input class="searchInput" placeholder="搜索预订人/酒店...">
              <button class="btnSmPrimary">搜索</button>
            </div>
            <button class="btnSmPrimary">+ 新增房型</button>
          </div>

          <table class="dataTable">
            <thead>
              <tr>
                <th>预订人</th>
                <th>酒店名称</th>
                <th>房型</th>
                <th>入住日期</th>
                <th>退房日期</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>张三</td>
                <td>伦敦希尔顿酒店</td>
                <td>标准双床房</td>
                <td>2026-11-09</td>
                <td>2026-11-13</td>
                <td><span class="statusBadge statusActive">已确认</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
              <tr>
                <td>李四</td>
                <td>伦敦万豪酒店</td>
                <td>豪华大床房</td>
                <td>2026-11-09</td>
                <td>2026-11-12</td>
                <td><span class="statusBadge statusPending">待支付</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
              <tr>
                <td>王五</td>
                <td>伦敦希尔顿酒店</td>
                <td>标准大床房</td>
                <td>2026-11-10</td>
                <td>2026-11-12</td>
                <td><span class="statusBadge statusActive">已确认</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
            </tbody>
          </table>

          <div class="pagination">
            <div class="pageSizeSelect">
              每页显示
              <select><option>10</option><option>20</option><option>50</option></select>
              条
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="pageInfo">共 467 条记录</span>
              <div class="pageButtons">
                <div class="pageBtn">‹</div>
                <div class="pageBtn active">1</div>
                <div class="pageBtn">2</div>
                <div class="pageBtn">...</div>
                <div class="pageBtn">47</div>
                <div class="pageBtn">›</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
