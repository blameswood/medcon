<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作台 - 管理后台</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ========== Dashboard 专属样式 ========== */
    /* 快捷入口 */
    .quickActions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .quickCard {
      background: var(--surface);
      border-radius: var(--radiusMd);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .quickCard:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .quickIcon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .quickLabel {
      font-size: 14px;
      font-weight: 500;
    }

    /* 待办提醒 */
    .todoList {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .todoItem {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-radius: var(--radiusMd);
    }

    .todoLeft {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .todoDot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
    }

    .todoDot.warn {
      background: #f59e0b;
    }

    .todoText {
      font-size: 14px;
    }

    .todoTime {
      font-size: 12px;
      color: var(--mutedForeground);
    }
  </style>
</head>
<body>
  <div class="adminLayout">

    <!-- 侧边栏 -->
    <aside class="adminSidebar">
      <div class="sidebarLogo">
        <span>✦</span>
        <span>会议管理后台</span>
      </div>
      <nav class="sidebarNav">
        <a class="sidebarItem active" href="index.html">
          <span class="sidebarIcon">📊</span> 工作台
        </a>
        <a class="sidebarItem" href="conference.html">
          <span class="sidebarIcon">🎤</span> 会议管理
        </a>
        <a class="sidebarItem" href="attendees.html">
          <span class="sidebarIcon">👥</span> 参会管理
        </a>
        <a class="sidebarItem" href="papers.html">
          <span class="sidebarIcon">📄</span> 投稿评审
        </a>
        <a class="sidebarItem" href="hotel.html">
          <span class="sidebarIcon">🏨</span> 住宿管理
        </a>
        <div class="sidebarDivider"></div>
        <a class="sidebarItem" href="settings.html">
          <span class="sidebarIcon">⚙️</span> 系统设置
        </a>
      </nav>
    </aside>

    <!-- 右侧 -->
    <div class="adminRight">

      <!-- 顶部栏 -->
      <div class="adminTopbar">
        <span class="topbarTitle">工作台</span>
        <div class="topbarRight">
          <span style="font-size:13px;color:var(--mutedForeground)">管理员</span>
          <div class="topbarAvatar">A</div>
        </div>
      </div>

      <!-- 主内容 -->
      <div class="adminContent">

        <!-- 数据统计 -->
        <div class="statsGrid">
          <div class="statCard">
            <span class="statLabel">总报名人数</span>
            <span class="statValue">1,286</span>
            <span class="statTrend">↑ 12% 较上周</span>
          </div>
          <div class="statCard">
            <span class="statLabel">已签到</span>
            <span class="statValue">892</span>
            <span class="statTrend">↑ 8% 较上周</span>
          </div>
          <div class="statCard">
            <span class="statLabel">论文投稿</span>
            <span class="statValue">358</span>
            <span class="statTrend">↑ 15% 较上周</span>
          </div>
          <div class="statCard">
            <span class="statLabel">酒店预订</span>
            <span class="statValue">467</span>
            <span class="statTrend">↑ 5% 较上周</span>
          </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quickActions">
          <div class="quickCard">
            <div class="quickIcon">📋</div>
            <span class="quickLabel">新增会议</span>
          </div>
          <div class="quickCard">
            <div class="quickIcon">👤</div>
            <span class="quickLabel">参会审核</span>
          </div>
          <div class="quickCard">
            <div class="quickIcon">📄</div>
            <span class="quickLabel">论文评审</span>
          </div>
          <div class="quickCard">
            <div class="quickIcon">📊</div>
            <span class="quickLabel">导出报表</span>
          </div>
        </div>

        <!-- 待办提醒 -->
        <div class="tableCard">
          <div class="tableToolbar">
            <span class="tableTitle">待办提醒</span>
          </div>
          <div style="padding:16px 24px">
            <div class="todoList">
              <div class="todoItem">
                <div class="todoLeft">
                  <div class="todoDot warn"></div>
                  <span class="todoText">3 篇论文待评审</span>
                </div>
                <span class="todoTime">今天</span>
              </div>
              <div class="todoItem">
                <div class="todoLeft">
                  <div class="todoDot"></div>
                  <span class="todoText">12 位参会者待审核</span>
                </div>
                <span class="todoTime">今天</span>
              </div>
              <div class="todoItem">
                <div class="todoLeft">
                  <div class="todoDot"></div>
                  <span class="todoText">酒店房型库存不足提醒</span>
                </div>
                <span class="todoTime">昨天</span>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

  </div>
</body>
</html>
