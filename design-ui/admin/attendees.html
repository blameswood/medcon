<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参会管理 - 管理后台</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div class="adminLayout">
    <aside class="adminSidebar">
      <div class="sidebarLogo"><span>✦</span><span>会议管理后台</span></div>
      <nav class="sidebarNav">
        <a class="sidebarItem" href="index.html"><span class="sidebarIcon">📊</span> 工作台</a>
        <a class="sidebarItem" href="conference.html"><span class="sidebarIcon">🎤</span> 会议管理</a>
        <a class="sidebarItem active" href="javascript:void(0)"><span class="sidebarIcon">👥</span> 参会管理</a>
        <a class="sidebarItem" href="papers.html"><span class="sidebarIcon">📄</span> 投稿评审</a>
        <a class="sidebarItem" href="hotel.html"><span class="sidebarIcon">🏨</span> 住宿管理</a>
        <div class="sidebarDivider"></div>
        <a class="sidebarItem" href="settings.html"><span class="sidebarIcon">⚙️</span> 系统设置</a>
      </nav>
    </aside>

    <div class="adminRight">
      <div class="adminTopbar">
        <span class="topbarTitle">参会管理</span>
        <div class="topbarRight">
          <span style="font-size:13px;color:var(--mutedForeground)">管理员</span>
          <div class="topbarAvatar">A</div>
        </div>
      </div>

      <div class="adminContent">
        <div class="tableCard">
          <div class="tableToolbar">
            <div style="display:flex;gap:12px;align-items:center">
              <input class="searchInput" placeholder="搜索姓名/手机号...">
              <button class="btnSmPrimary">搜索</button>
            </div>
            <div class="tableActions">
              <button class="btnSmOutline">导出 Excel</button>
              <button class="btnSmPrimary">+ 添加参会者</button>
            </div>
          </div>

          <table class="dataTable">
            <thead>
              <tr>
                <th>姓名</th>
                <th>手机号</th>
                <th>单位</th>
                <th>参会类别</th>
                <th>报名状态</th>
                <th>签到状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>张三</td>
                <td>138****8000</td>
                <td>北京大学医学部</td>
                <td>普通代表</td>
                <td><span class="statusBadge statusActive">已支付</span></td>
                <td><span class="statusBadge statusActive">已签到</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
              <tr>
                <td>李四</td>
                <td>139****6789</td>
                <td>复旦大学附属医院</td>
                <td>演讲嘉宾</td>
                <td><span class="statusBadge statusActive">已确认</span></td>
                <td><span class="statusBadge statusPending">未签到</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
              <tr>
                <td>王五</td>
                <td>137****1234</td>
                <td>中山大学</td>
                <td>学生代表</td>
                <td><span class="statusBadge statusPending">待支付</span></td>
                <td><span class="statusBadge statusDraft">-</span></td>
                <td><a href="javascript:void(0)" style="color:var(--primary);font-size:13px">详情</a></td>
              </tr>
            </tbody>
          </table>

          <div class="pagination">
            <div class="pageSizeSelect">
              每页显示
              <select><option>10</option><option>20</option><option>50</option></select>
              条
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="pageInfo">共 1,286 条记录</span>
              <div class="pageButtons">
                <div class="pageBtn">‹</div>
                <div class="pageBtn active">1</div>
                <div class="pageBtn">2</div>
                <div class="pageBtn">3</div>
                <div class="pageBtn">...</div>
                <div class="pageBtn">129</div>
                <div class="pageBtn">›</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
