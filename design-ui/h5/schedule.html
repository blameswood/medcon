<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>会议日程 - H5</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ========== 日程页专属样式 ========== */

    /* 标题栏 */
    .schTitleBar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 600;
    }

    /* 会场切换 Tab */
    .venueTabs {
      display: flex;
      height: 44px;
      border-bottom: 1px solid var(--border);
    }

    .venueTab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--mutedForeground);
      cursor: pointer;
      position: relative;
    }

    .venueTab.active {
      color: var(--primary);
      font-weight: 600;
    }

    .venueTab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
    }

    /* 日期切换行 */
    .dateBar {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
    }

    .dateChip {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--foreground);
      cursor: pointer;
      white-space: nowrap;
    }

    .dateChip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* 日程列表容器 */
    .schContent {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 单个日程卡片 */
    .schCard {
      background: var(--surface);
      border-radius: var(--radiusLg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .schCardHeader {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .schTime {
      font-size: 15px;
      font-weight: 600;
      color: var(--primary);
    }

    .schType {
      font-size: 12px;
      color: var(--mutedForeground);
      margin-top: 2px;
    }

    .schTitle {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
    }

    .schSpeaker {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--mutedForeground);
    }

    .schSpeakerAvatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }

    /* 关注按钮 */
    .followBtn {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      white-space: nowrap;
    }

    .followBtn.followed {
      background: var(--primary);
      color: white;
    }
  </style>
</head>
<body>
  <div class="pageWrap">

    <!-- 状态栏 -->
    <div class="statusBar">
      <span>9:41</span>
    </div>

    <!-- 标题 -->
    <div class="schTitleBar">会议日程</div>

    <!-- 会场切换 -->
    <div class="venueTabs">
      <div class="venueTab active">主会场</div>
      <div class="venueTab">分会场A</div>
      <div class="venueTab">分会场B</div>
    </div>

    <!-- 日期切换 -->
    <div class="dateBar">
      <div class="dateChip active">11月10日</div>
      <div class="dateChip">11月11日</div>
      <div class="dateChip">11月12日</div>
    </div>

    <!-- 日程列表 -->
    <div class="schContent">

      <!-- 日程1 -->
      <div class="schCard">
        <div class="schCardHeader">
          <div>
            <div class="schTime">09:00 - 10:30</div>
            <div class="schType">主旨演讲</div>
          </div>
          <button class="followBtn followed">☆ 已关注</button>
        </div>
        <div class="schTitle">大会开幕式及主旨演讲 - 探讨未来医学</div>
        <div class="schSpeaker">
          <div class="schSpeakerAvatar">张</div>
          <span>张志明 教授 · 北京大学医学部</span>
        </div>
      </div>

      <!-- 日程2 -->
      <div class="schCard">
        <div class="schCardHeader">
          <div>
            <div class="schTime">10:30 - 12:00</div>
            <div class="schType">专家论坛</div>
          </div>
          <button class="followBtn">☆ 关注</button>
        </div>
        <div class="schTitle">AI在肿瘤靶向治疗中的应用</div>
        <div class="schSpeaker">
          <div class="schSpeakerAvatar">李</div>
          <span>李明浩 研究员 · 复旦大学附属医院</span>
        </div>
      </div>

      <!-- 日程3 -->
      <div class="schCard">
        <div class="schCardHeader">
          <div>
            <div class="schTime">13:30 - 15:30</div>
            <div class="schType">主题报告</div>
          </div>
          <button class="followBtn">☆ 关注</button>
        </div>
        <div class="schTitle">基因治疗与细胞免疫治疗新进展</div>
        <div class="schSpeaker">
          <div class="schSpeakerAvatar">刘</div>
          <span>刘伟 教授 · 中山大学附属肿瘤医院</span>
        </div>
      </div>

      <!-- 日程4 - 茶歇 -->
      <div class="schCard">
        <div class="schCardHeader">
          <div>
            <div class="schTime">15:30 - 15:45</div>
            <div class="schType">茶歇</div>
          </div>
        </div>
        <div class="schTitle">茶歇与自由交流</div>
        <div class="schSpeaker">
          <span style="color: var(--mutedForeground);">全体参会人员</span>
        </div>
      </div>

      <!-- 日程5 -->
      <div class="schCard">
        <div class="schCardHeader">
          <div>
            <div class="schTime">15:45 - 17:00</div>
            <div class="schType">闭门研讨</div>
          </div>
          <button class="followBtn">☆ 关注</button>
        </div>
        <div class="schTitle">闭门研讨会：医改新政解读</div>
        <div class="schSpeaker">
          <div class="schSpeakerAvatar">王</div>
          <span>王五 教授</span>
        </div>
      </div>

    </div>

    <!-- 底部 Tab -->
    <div class="tabBar">
      <div class="tabItem" onclick="location.href='index.html'">
        <span class="tabIcon">🏠</span>
        <span>首页</span>
      </div>
      <div class="tabItem active" onclick="location.href='schedule.html'">
        <span class="tabIcon">📅</span>
        <span>日程</span>
      </div>
      <div class="tabItem" onclick="location.href='profile.html'">
        <span class="tabIcon">👤</span>
        <span>我的</span>
      </div>
    </div>

  </div>
</body>
</html>
